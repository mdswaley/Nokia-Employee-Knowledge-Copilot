spring:
  application:
    name: Nokia-Employee-Knowledge-Copilot
  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: qwen3:4b
          temperature: 0.7
      embedding:
        options:
          model: nomic-embed-text

    vectorstore:
      pgvector:
        initialize-schema: true
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always
            table-name: chat_memory

  datasource:
    url: jdbc:postgresql://localhost:5435/nokia_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  logging:
    level:
      org.springframework.ai:
        chat.client: DEBUG
